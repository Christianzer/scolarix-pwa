name: Deploy scolarix-web

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # 1. Build de vérification (TypeScript + Next.js)
  # ─────────────────────────────────────────
  build:
    name: Build Next.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Vérification TypeScript
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Linting
        run: npm run lint
        continue-on-error: true

      - name: Build de production
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  # ─────────────────────────────────────────
  # 2. Déploiement sur le VPS
  # ─────────────────────────────────────────
  deploy:
    name: Déploiement VPS (82.25.117.63)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "── [1/5] Pull du code ──"
            cd /var/www/scolarix-web
            git pull origin main

            echo "── [2/5] Installation des dépendances ──"
            npm ci

            echo "── [3/5] Build de production ──"
            npm run build

            echo "── [4/5] Redémarrage PM2 ──"
            pm2 restart scolarix-web --update-env 2>/dev/null || \
              pm2 start npm --name "scolarix-web" -- start -- -p 3003
            pm2 save

            echo "── [5/5] Vérification ──"
            sleep 3
            pm2 show scolarix-web | grep -E "status|restarts"

            echo ""
            echo "✓ scolarix-web déployé le $(date '+%Y-%m-%d %H:%M:%S UTC')"
